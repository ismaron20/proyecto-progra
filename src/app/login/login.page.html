<ion-content class="ion-padding">
  <div class="fondo-gradiente"></div>
  
  <div class="contenido-principal">
    
    <div class="marca">
      <div class="logo-circle">
        <ion-icon name="cut-outline"></ion-icon>
      </div>
      <h1 class="titulo-marca">Barbería</h1>
      <p class="slogan-marca">Estilo & Clase</p>
    </div>

    <div class="form-card">
      <h2>Iniciar Sesión</h2>
      <p>Ingresa con tu correo electrónico</p>

      <div class="input-group">
        <ion-icon name="mail-outline" class="input-icon"></ion-icon>
        <ion-input [(ngModel)]="email" type="email" placeholder="Correo electrónico" (ionChange)="onEmailChange()"></ion-input>
      </div>

      <div class="input-group" *ngIf="mostrarContrasena">
        <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
        <ion-input [(ngModel)]="password" type="password" placeholder="Contraseña"></ion-input>
      </div>

      <button class="btn-principal" (click)="iniciarSesion()" [disabled]="cargando">
        <ion-icon [name]="cargando ? 'refresh-outline' : 'log-in-outline'" [class.spinner]="cargando"></ion-icon>
        {{ cargando ? 'Verificando...' : 'Continuar' }}
      </button>

      <div class="separador">
        <span>O</span>
      </div>

      <button class="btn-google" (click)="loginConGoogle()" [disabled]="cargando">
        <ion-icon name="logo-google"></ion-icon>
        Continuar con Google
      </button>

      <div *ngIf="errorMensaje" class="error-mensaje">
        {{ errorMensaje }}
      </div>
      
      <div *ngIf="infoMensaje" class="info-mensaje">
        {{ infoMensaje }}
      </div>
    </div>

    <div class="footer">
      <p>Al continuar, aceptas nuestros términos y condiciones</p>
    </div>

  </div>
</ion-content>
